<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Brand mark: rounded "at" pill matching the Sidebar logo. Background
       uses the theme primary baked at build time (HSL 258 70% 64%). -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#3b1f7a" />
  <rect x="2" y="2" width="28" height="28" rx="7" fill="url(#g)" opacity="0.85" />
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff" />
      <stop offset="100%" stop-color="#5b39d8" />
    </linearGradient>
  </defs>
  <text x="16" y="22" font-family="ui-monospace, monospace" font-weight="700"
        font-size="15" text-anchor="middle" fill="#ffffff">at</text>
</svg>
